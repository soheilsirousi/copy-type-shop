{% extends 'admin/base_admin.html' %}

{% block title %}ویرایش کاربر{% endblock %}
{% block nav_users %}active{% endblock %}

{% block content %}
<a href="{% url 'admin_users' %}" class="btn btn-ghost" style="margin-bottom:20px;">‹ بازگشت به لیست کاربران</a>

<div class="page-title">ویرایش کاربر #{{ target_user.id }}</div>
<div class="page-sub">تغییر اطلاعات حساب کاربری.</div>

<form method="post" class="form-card" style="max-width:460px;">
  {% csrf_token %}

  <label for="id_username">نام کاربری</label>
  <input type="text" name="username" id="id_username" value="{{ target_user.username }}" required>

  <label for="id_email">ایمیل</label>
  <input type="email" name="email" id="id_email" value="{{ target_user.email }}">

  <label for="id_new_password">رمز عبور جدید (اختیاری)</label>
  <input type="password" name="new_password" id="id_new_password" placeholder="خالی بگذارید تا تغییر نکند">

  <label style="display:flex; align-items:center; gap:8px; font-weight:600; color:var(--ink); margin-bottom:20px;">
    <input type="checkbox" name="is_active" style="width:auto; margin:0;" {% if target_user.is_active %}checked{% endif %}>
    حساب کاربر فعال باشد
  </label>

  <div style="display:flex; gap:10px;">
    <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
    <a href="{% url 'admin_users' %}" class="btn btn-ghost">انصراف</a>
  </div>
</form>
{% endblock %}
